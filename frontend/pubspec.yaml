name: learning_agent_frontend
description: Flutter client for the learning agent (topics, quizzes, strengths).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0

  # HTTP client
  dio: ^5.7.0

  # Navigation
  go_router: ^14.2.0

  # Charts for strength bar
  fl_chart: ^0.69.0

  cupertino_icons: ^1.0.8

  # Auth & token persistence
  google_sign_in: ^6.2.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

